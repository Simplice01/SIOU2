<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant SIOU - Accueil</title>
  <meta name="description" content="SIOU - Système Intelligent d'Orientation des Usagers. Posez vos questions sur les démarches administratives béninoises.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/00-variables.css">
  <link rel="stylesheet" href="/assets/css/01-base.css">
  <link rel="stylesheet" href="/assets/css/02-layout.css">
  <link rel="stylesheet" href="/assets/css/03-components.css">
  <link rel="stylesheet" href="/assets/css/04-chat.css">
  <link rel="stylesheet" href="/assets/css/05-animations.css">
  <link rel="stylesheet" href="/assets/css/06-responsive.css">
</head>
<body data-page="home">
  <a class="skip-link" href="#main-content">Aller au contenu principal</a>

  <div class="app-shell">
    <div data-component="sidebar"></div>

    <div class="content">
      <div data-component="topbar"></div>

      <main id="main-content" class="page">
        <!-- Conteneur pour le contenu dynamique -->
        <div id="dynamic-content" data-load-chat></div>
      </main>
    </div>
  </div>

  <script type="module">
    // Charger dynamiquement le contenu du chat
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        const response = await fetch('/pages/chat-content.html?v=' + Date.now());
        if (response.ok) {
          const content = await response.text();
          document.getElementById('dynamic-content').innerHTML = content;

          // Charger le script principal d'abord (il enregistre son écouteur
          // sur 'siou:components-ready' avant que les composants soient injectés)
          await import('/assets/js/main.js');

          // Charger les composants partagés (sidebar, topbar)
          const { loadSharedComponents } = await import('/assets/js/modules/component-loader.js');
          await loadSharedComponents();

          // Initialiser les composants après chargement
          await import('/assets/js/modules/chat.js');
        } else {
          // Redirection vers la page chat si le chargement dynamique échoue
          window.location.href = '/pages/chat.html';
        }
      } catch (error) {
        console.error('Erreur de chargement dynamique:', error);
        window.location.href = '/pages/chat.html';
      }
    });
  </script>
</body>
</html>
