<!--
  Composant : Barre supérieure.
  Les notifications sont chargées depuis /api/notifications.
-->
<header class="topbar">
  <button class="topbar__menu-btn" data-mobile-menu-toggle aria-expanded="false" aria-controls="sidebar" aria-label="Ouvrir la navigation">
    <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <div class="topbar__actions">
    <button class="icon-btn" data-theme-toggle aria-pressed="false" aria-label="Activer le thème sombre" data-tooltip="Changer de thème">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>

    <div class="topbar__notifications">
      <button class="icon-btn" data-notifications-trigger aria-haspopup="true" aria-expanded="false" aria-label="Notifications" data-tooltip="Notifications">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="icon-btn__dot" data-notifications-dot aria-hidden="true" hidden></span>
      </button>

      <div class="context-menu context-menu--notifications" data-notifications-panel role="dialog" aria-label="Notifications">
        <div class="notifications-panel__header">
          <strong class="notifications-panel__title">Notifications</strong>
          <button class="notifications-panel__mark-read" data-notifications-mark-read>Tout marquer comme lu</button>
        </div>
        <div data-notifications-list>
          <div class="notification-item">
            <p class="notification-item__title">Chargement...</p>
            <p class="notification-item__meta">Recherche des notifications</p>
          </div>
        </div>
        <a class="notifications-panel__all" href="/pages/notifications.html">Voir toutes les notifications</a>
      </div>
    </div>

    <a class="topbar__user" href="/pages/profil.html" data-user-link aria-label="Voir mon profil">
      <span class="avatar" data-user-avatar aria-hidden="true">VS</span>
    </a>

    <button class="icon-btn" data-logout aria-label="Se déconnecter" data-tooltip="Se déconnecter">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </div>
</header>
