<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable - SIOU</title>
  <meta name="description" content="La page demandée est introuvable sur SIOU.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/00-variables.css">
  <link rel="stylesheet" href="/assets/css/01-base.css">
  <link rel="stylesheet" href="/assets/css/03-components.css">
  <link rel="stylesheet" href="/assets/css/05-animations.css">
  <link rel="stylesheet" href="/assets/css/06-responsive.css">

  <style>
    .error-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--sp-6);
      position: relative;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      background: var(--gradient-signature);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .error-shell .signature-thread {
      position: absolute;
      bottom: 0; left: 0;
    }
  </style>
</head>
<body data-page="404">
  <main class="error-shell">
    <div class="sidebar__brand-mark" aria-hidden="true" style="width:44px;height:44px;margin-bottom:var(--sp-6);"></div>
    <p class="error-code" aria-hidden="true">404</p>
    <h1 style="margin-top: var(--sp-3);">Cette page n'existe pas</h1>
    <p style="max-width: 440px; margin: var(--sp-3) auto var(--sp-6);">
      Le lien que vous avez suivi est peut-être incorrect, ou la page a été déplacée.
      Retournez au tableau de bord ou posez directement votre question à l'assistant.
    </p>
    <div style="display:flex; gap: var(--sp-3); flex-wrap:wrap; justify-content:center;">
      <a class="btn btn--primary" href="/index.html">Retour au tableau de bord</a>
      <a class="btn btn--secondary" href="/pages/chat.html">Ouvrir l'assistant SIOU</a>
    </div>
    <div class="signature-thread" aria-hidden="true"></div>
  </main>

  <script type="module">
    // Charger le script principal d'abord (il enregistre son écouteur
    // sur 'siou:components-ready' avant que les composants soient injectés)
    await import('/assets/js/main.js');

    // Charger les composants partagés (sidebar, topbar)
    const { loadSharedComponents } = await import('/assets/js/modules/component-loader.js');
    await loadSharedComponents();
  </script>
</body>
</html>
