<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant SIOU - Conversation</title>
  <meta name="description"
    content="Posez vos questions sur les démarches administratives béninoises à l'assistant SIOU.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/00-variables.css">
  <link rel="stylesheet" href="/assets/css/01-base.css">
  <link rel="stylesheet" href="/assets/css/02-layout.css">
  <link rel="stylesheet" href="/assets/css/03-components.css">
  <link rel="stylesheet" href="/assets/css/04-chat.css">
  <link rel="stylesheet" href="/assets/css/05-animations.css">
  <link rel="stylesheet" href="/assets/css/06-responsive.css">
</head>

<body data-page="chat">
  <a class="skip-link" href="#chat-input">Aller au champ de saisie</a>

  <div class="app-shell">
    <div data-component="sidebar"></div>

    <div class="content">
      <div data-component="topbar"></div>

      <section class="chat-layout" aria-label="Assistant conversationnel SIOU">
        <!-- Historique (gauche) -->
        <aside class="chat-history" aria-label="Historique des conversations">
          <div class="chat-history__header">
            <button class="btn btn--primary btn--block" id="new-chat-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14" />
              </svg>
              Nouvelle conversation
            </button>
            <!-- Bouton pour masquer l'historique -->
            <button class="history-toggle-btn" id="history-toggle-collapse" aria-label="Masquer l'historique"
              title="Masquer l'historique">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
          </div>
          <nav class="chat-history__list" aria-label="Conversations précédentes">
            <!-- Alimenté dynamiquement par chat.js (GET /api/conversations). -->
            <p class="chat-history__hint">Chargement…</p>
          </nav>
        </aside>

        <!-- Zone de conversation (centre) -->
        <div class="chat-main">
          <div class="chat-thread" role="log" aria-live="polite" aria-label="Fil de conversation">
            <div class="chat-thread__inner">
              <div class="chat-welcome">
                <div class="chat-welcome__badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 9.5 12 4l9 5.5" />
                  <path d="M5 10v7M9.33 10v7M14.67 10v7M19 10v7" />
                  <path d="M4.5 17.5h15" />
                  <path d="M3.5 20.5h17" />
                </svg>
              </div>
                <h1>Bonjour, je suis SIOU</h1>
                <p class="page__desc">Votre assistant intelligent pour vous orienter dans les démarches administratives
                  béninoises. Posez votre question ci-dessous.</p>

                <div class="suggestion-grid">
                  <button class="suggestion-card" data-suggestion="Comment obtenir un extrait de naissance en ligne ?">
                    <p class="suggestion-card__title">Extrait de naissance</p>
                    <p class="suggestion-card__desc">Comment l'obtenir en ligne ?</p>
                  </button>
                  <button class="suggestion-card"
                    data-suggestion="Quelles pièces pour une carte d'identité biométrique ?">
                    <p class="suggestion-card__title">Carte d'identité</p>
                    <p class="suggestion-card__desc">Quelles pièces sont nécessaires ?</p>
                  </button>
                  <button class="suggestion-card" data-suggestion="Où déposer un dossier de création d'entreprise ?">
                    <p class="suggestion-card__title">Création d'entreprise</p>
                    <p class="suggestion-card__desc">Où déposer mon dossier ?</p>
                  </button>
                  <button class="suggestion-card" data-suggestion="Quel est le délai de traitement d'un passeport ?">
                    <p class="suggestion-card__title">Passeport biométrique</p>
                    <p class="suggestion-card__desc">Quel délai de traitement ?</p>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Champ de saisie -->
          <div class="chat-composer">
            <form data-composer-form>
              <div class="composer-box">
                <div class="composer-box__attachments" data-composer-attachments></div>
                <div class="composer-box__input-row">
                  <label for="chat-input" class="sr-only">Votre question</label>
                  <textarea id="chat-input" data-composer-input rows="1" placeholder="Écrivez votre question à SIOU..."
                    aria-describedby="composer-hint"></textarea>
                </div>
                <div class="composer-box__toolbar">
                  <div class="composer-box__tools">
                    <button type="button" class="icon-btn" data-composer-attach data-tooltip="Joindre un fichier"
                      aria-label="Joindre un fichier" style="width:32px;height:32px;">
                      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path
                          d="M21.44 11.05 12.25 20.24a5 5 0 0 1-7.07-7.07l8.49-8.49a3.5 3.5 0 0 1 4.95 4.95L9.83 17.31a2 2 0 0 1-2.83-2.83l7.78-7.78" />
                      </svg>
                    </button>
                    <input type="file" data-composer-file hidden multiple accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">
                    <button type="button" class="icon-btn" data-composer-mic data-tooltip="Saisie vocale"
                      aria-label="Saisie vocale" aria-pressed="false" style="width:32px;height:32px;">
                      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="23" />
                        <line x1="8" y1="23" x2="16" y2="23" />
                      </svg>
                      <span class="mic-btn__pulse" aria-hidden="true"></span>
                    </button>
                  </div>
                  <button type="submit" class="composer-box__send" data-composer-send disabled
                    aria-label="Envoyer le message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
                      <path d="M12 19V5M5 12l7-7 7 7" />
                    </svg>
                  </button>
                </div>
              </div>
              <p class="composer-hint" id="composer-hint">
                <kbd>Entrée</kbd> pour envoyer · <kbd>Maj+Entrée</kbd> pour une nouvelle ligne · <kbd>/</kbd> pour
                focaliser
              </p>
            </form>
          </div>
        </div>
        <!-- Bouton flottant pour réafficher l'historique (visible lorsque masqué) -->
        <button class="history-toggle-floating" id="history-toggle-expand" aria-label="Afficher l'historique"
          title="Afficher l'historique">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </button>
      </section>
    </div>
  </div>

  <!-- Les menus d'options des conversations sont créés dynamiquement par chat.js. -->

  <script type="module">
    await import('/assets/js/main.js');

    const { loadSharedComponents } = await import('/assets/js/modules/component-loader.js');
    await loadSharedComponents();

    await import('/assets/js/modules/chat.js');
  </script>
</body>

</html>
