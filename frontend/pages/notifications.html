<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - SIOU</title>
  <meta name="description" content="Consultation et gestion des notifications SIOU.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/00-variables.css">
  <link rel="stylesheet" href="/assets/css/01-base.css">
  <link rel="stylesheet" href="/assets/css/02-layout.css">
  <link rel="stylesheet" href="/assets/css/03-components.css">
  <link rel="stylesheet" href="/assets/css/04-chat.css">
  <link rel="stylesheet" href="/assets/css/05-animations.css">
  <link rel="stylesheet" href="/assets/css/06-responsive.css">
</head>
<body data-page="notifications">
  <a class="skip-link" href="#main-content">Aller au contenu principal</a>

  <div class="app-shell">
    <div data-component="sidebar"></div>

    <div class="content">
      <div data-component="topbar"></div>

      <main id="main-content" class="page">
        <div class="page__header">
          <div>
            <p class="page__eyebrow">Communication</p>
            <h1 class="page__title">Notifications</h1>
            <p class="page__desc">Messages ciblés envoyés aux utilisateurs de SIOU.</p>
          </div>
          <button class="btn btn--primary" data-admin-only data-require-role="admin, administrateur" data-notification-compose type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
            Créer une notification
          </button>
        </div>

        <section class="card notification-composer" data-admin-only data-require-role="admin, administrateur" data-notification-form-wrap hidden>
          <form data-notification-form novalidate>
            <div class="grid grid--2">
              <div class="field">
                <label class="field__label" for="notification-title">Titre</label>
                <input id="notification-title" name="title" class="input" type="text" maxlength="180" required>
              </div>
              <div class="field">
                <label class="field__label" for="notification-target">Destinataires</label>
                <select id="notification-target" name="target_role" class="select">
                  <option value="all">Tous les utilisateurs</option>
                  <option value="user">Usagers</option>
                  <option value="secretary">Secrétaires</option>
                  <option value="validator">Validateurs / points focaux</option>
                  <option value="ministry_manager">Responsables ministère</option>
                  <option value="admin">Administrateurs</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="notification-message">Message</label>
              <textarea id="notification-message" name="message" class="textarea" rows="4" maxlength="3000" required></textarea>
            </div>

            <div class="grid grid--2">
              <div class="field">
                <label class="field__label" for="notification-type">Type</label>
                <select id="notification-type" name="notification_type" class="select">
                  <option value="info">Information</option>
                  <option value="success">Succès</option>
                  <option value="warning">Avertissement</option>
                  <option value="danger">Urgent</option>
                  <option value="system">Système</option>
                </select>
              </div>
              <div class="field">
                <label class="field__label" for="notification-priority">Priorité</label>
                <select id="notification-priority" name="priority" class="select">
                  <option value="normal">Normale</option>
                  <option value="low">Basse</option>
                  <option value="high">Haute</option>
                  <option value="urgent">Urgente</option>
                </select>
              </div>
            </div>

            <div class="notification-composer__actions">
              <button class="btn btn--secondary" data-notification-cancel type="button">Annuler</button>
              <button class="btn btn--primary" type="submit">Envoyer</button>
            </div>
          </form>
        </section>

        <section class="card">
          <div class="documents-toolbar">
            <div class="field documents-toolbar__search">
              <label for="notification-search" class="sr-only">Rechercher une notification</label>
              <input id="notification-search" type="search" class="input" placeholder="Rechercher une notification..."
                data-search-input data-search-target="[data-notification-list]" data-search-item="[data-search-item]">
            </div>
            <button class="btn btn--secondary" data-notifications-read-all type="button">Tout marquer comme lu</button>
          </div>

          <div class="notification-list" data-notification-list>
            <p style="padding: var(--sp-5); color: var(--color-text-secondary);">Chargement...</p>
          </div>
        </section>

        <div class="empty-state" data-search-empty hidden>
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <h3 class="empty-state__title">Aucune notification</h3>
          <p>Aucune notification ne correspond à votre recherche.</p>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    await import('/assets/js/main.js');
    const { loadSharedComponents } = await import('/assets/js/modules/component-loader.js');
    await loadSharedComponents();
    await import('/assets/js/modules/notifications-page.js');
  </script>
</body>
</html>
