services:
  - type: web
    name: siou2-backend
    env: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: RAG_TOP_K
        value: "5"
      - key: RAG_MIN_SCORE
        value: "0.1"
